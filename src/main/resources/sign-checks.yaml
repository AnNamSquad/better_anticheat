hacks:
  meteor-client:
    display-name: "Meteor Client"
    key: "key.meteor-client.open-gui"
    mode: "METEOR"

  liquidbounce:
    display-name: "LiquidBounce"
    key: "liquidbounce.module.killaura.name"
    mode: "TRANSLATE"

  freecam:
    display-name: "Freecam"
    key: "key.freecam.toggle"
    mode: "KEYBIND"

  wurst:
    display-name: "Wurst Client"
    key: "key.wurst.zoom"
    mode: "KEYBIND"

  xray-fabric:
    display-name: "XRay (Fabric)"
    key: "xray.config.toggle"
    mode: "KEYBIND"

  chestesp:
    display-name: "ChestESP"
    key: "key.chestesp.toggle"
    mode: "KEYBIND"

  killaura-fabric:
    display-name: "KillAura (Fabric)"
    key: "key.killaura"
    mode: "KEYBIND"

  autofish:
    display-name: "AutoFish"
    key: "key.autofish.open_gui"
    mode: "KEYBIND"

  lumina:
    display-name: "Lumina"
    key: "key.lumina.open_click_gui"
    mode: "KEYBIND"

  autoswitch:
    display-name: "AutoSwitch"
    key: "key.autoswitch.toggle"
    mode: "KEYBIND"

  bleachhack:
    display-name: "BleachHack"
    key: "bleachhack.module.killaura"
    mode: "TRANSLATE"

  aristois:
    display-name: "Aristois"
    key: "emc.module.killaura.name"
    mode: "TRANSLATE"

  coffee:
    display-name: "Coffee Client"
    key: "coffee.module.killaura.name"
    mode: "TRANSLATE"

  world-downloader:
    display-name: "World Downloader"
    key: "key.wdl.startStop"
    mode: "TRANSLATE"

  autoclicker-fabric:
    display-name: "AutoClicker (Fabric)"
    key: "autoclicker-fabric.hud.holding"
    mode: "TRANSLATE"

  antiafk:
    display-name: "AntiAFK"
    key: "key.antiafk.toggle"
    mode: "TRANSLATE"

  auto-clicker-mc:
    display-name: "Auto Clicker (p1k0chu)"
    key: "key.auto-clicker_.toggle"
    mode: "KEYBIND"

settings:
  # Check players 2 seconds after joining
  check-on-join: true
  check-delay-ticks: 40
  # Provide an alert template
  alert: "&c<player> was caught using <name>!"
  console-commands:
    - "kick <player> Unallowed Client: <name>"
