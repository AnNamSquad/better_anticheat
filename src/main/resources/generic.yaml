# Generic detection rules based on MC|Brand and Plugin Channels
# Format:
#   name: action_name
#   matches: [list of substrings to match]

brands:
  labymod:
    action: labymod
    matches:
      - "labymod"
  fabric:
    action: fabric_mod
    matches:
      - "fabric"
  meteor:
    action: generic_mod
    matches:
      - "meteor"
  opsec:
    action: generic_mod
    matches:
      - "opsec"
  liteloader:
    action: generic_mod
    matches:
      - "liteloader"
  rift:
    action: generic_mod
    matches:
      - "rift"

channels:
  worlddownloader:
    action: generic_mod
    matches:
      - "wdl:init"
      - "wdl:control"
  journeymap:
    action: journeymap-ban
    matches:
      - "journeymap"
  meteor:
    action: generic_mod
    matches:
      - "meteor"
  opsec:
    action: generic_mod
    matches:
      - "opsec"
  "5zig Mod":
    action: generic_mod
    matches:
      - "5zig_set"
  "PX Mod":
    action: generic_mod
    matches:
      - "px|version"
  "Better Sprinting":
    action: generic_mod
    matches:
      - "bsprint"
  "World Edit CUI":
    action: generic_mod
    matches:
      - "wecui"

  "ExampleClient":
    action: generic_mod
    matches:
      - "example channel"
