# Generic detection rules based on MC|Brand and Plugin Channels
# Format:
#   name: action_name
#   matches: [list of substrings to match]

brands:
  vape:
    action: vape
    matches:
      - "vape"
  labymod:
    action: labymod
    matches:
      - "labymod"
  fabric:
    action: fabric_mod
    matches:
      - "fabric"
  meteor:
    action: generic_mod
    matches:
      - "meteor"
  opsec:
    action: generic_mod
    matches:
      - "opsec"

channels:
  worlddownloader:
    action: generic_mod
    matches:
      - "wdl:init"
      - "wdl:control"
  meteor:
    action: generic_mod
    matches:
      - "meteor"
  opsec:
    action: generic_mod
    matches:
      - "opsec"
