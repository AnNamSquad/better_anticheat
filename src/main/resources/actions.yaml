# Actions when a client/mod is detected
# Types: ALERT, KICK, BAN, COMMAND

punishments:
  vape:
    - type: ALERT
      message: "&c%player% &7đã bị phát hiện sử dụng &cVape&7!"
    - type: BAN
      duration: "15m"
      message: "&cHãy gỡ Vape và đợi 15 phút để vào lại"
  
  generic_mod:
    - type: ALERT
      message: "&e%player% &7có thể đang sử dụng mod không cho phép: &e%mod%&7."
    - type: BAN
      duration: "15m"
      message: "&cHãy gỡ %mod% và đợi 15 phút để vào lại"

  labymod:
